# Edge/docker-compose.yml
services:
  sensors:
    build:
      context: .
      dockerfile: Dockerfile.light
    image: iot_smart_classroom_edge/sensors:latest
    command: python -u device_connector.py
    environment:
      - MQTT_BROKER=${MQTT_BROKER_HOST}
      - ROOM_ID=${ROOM_ID}
      - TEMP_MODE=${TEMP_MODE}
      - MOTION_START_HOUR=${MOTION_START_HOUR}
      - MOTION_END_HOUR=${MOTION_END_HOUR}
    restart: unless-stopped
#    devices:
#      - "/dev/gpiomem:/dev/gpiomem"
    volumes:
      - /etc/localtime:/etc/localtime:ro
#    privileged: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    network_mode: "host"

  controller:
    build:
      context: .
      dockerfile: Dockerfile.light
    image: iot_smart_classroom_edge/controller:latest
    command: python -u control_module.py
    environment:
      - MQTT_BROKER=${MQTT_BROKER_HOST}
      - ROOM_ID=${ROOM_ID}
#      - STATS_URL=${STATS_URL}
      - DEFAULT_AC_PRECOOL_TEMP=${DEFAULT_AC_PRECOOL_TEMP}
      - THRESHOLD_BASE=${THRESHOLD_BASE}
      - HOLDUP_BAND=${HOLDUP_BAND}
      - MANUAL_MODE_HOLD_SECONDS=${MANUAL_MODE_HOLD_SECONDS}
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
#     - "/sys:/sys:ro"  # Read-only access to 1-Wire bus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    network_mode: "host"

  camera:
    build:
      context: .
      dockerfile: Dockerfile.rpi  # 👈 Use Raspberry Pi optimized Dockerfile
    image: iot_smart_classroom_edge/camera:latest
    command: python -u camera_module.py
    environment:
      - MQTT_BROKER=${MQTT_BROKER_HOST}
      - ROOM_ID=${ROOM_ID}
      - HAS_CAMERA=${HAS_CAMERA}
      - MOTION_SENSOR_TIMEOUT=${MOTION_SENSOR_TIMEOUT}
      - CAMERA_ACTIVE_SECONDS=${CAMERA_ACTIVE_SECONDS}
      - CAMERA_SLEEP_SECONDS=${CAMERA_SLEEP_SECONDS}
    devices:
      - "/dev/video0:/dev/video0"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    network_mode: "host"
